kind: added
body: Core and EVM plumbing for the ERC-8021 builder-code extension. The client now deep-merges extensions while preserving server-declared fields and re-merges them after client enrichment; the resource server validates client-echoed extension info and rejects mismatches with extension_echo_mismatch. The FacilitatorEvmSigner.WriteContract method gains a dataSuffix parameter, and the base evm package adds data-suffix helpers (ResolveDataSuffix, AppendDataSuffix) plus the BuilderCodeFacilitatorExtension interface, threaded through all EVM settle paths (exact EIP-3009 incl. V1, permit2/EIP-2612, upto, and batch-settlement) so a registered facilitator extension can append an ERC-8021 calldata suffix to settlement transactions.
